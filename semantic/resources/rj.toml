# Romeo & Juliet Model Configuration - Fast Training
# Usage: uv run python agi2_train.py resources/rj.toml

sources = [
    "samples/romeo_juliette.txt",
    "resources/training/corpus20.txt"
]

tokenizer = "tiktoken"
model_name = "rj"
model_path = "trained/rj.pt"

# Training
epochs = 50
batch_size = 24
learning_rate = 5e-4
seq_len_start = 2
seq_len_end = 512

# Model architecture
model_positions = 512
model_embd = 384
model_layer = 6
model_head = 6
model_activation = "gelu"
model_dropout = 0.1

# Cosine similarity training
geometric_ratio = 0.7
anchor_ratio = 0.3
sigmoid_scale_start = 3.0
sigmoid_scale_end = 10.0

# Performance
use_compile = false
use_amp = false

# Device and resume
device = "auto"
resume = ""

# Generation
max_length = 300
temperature = 0.8
beam_size = 3
model_seed = """
In Verona, where the bells toll for vespers and the marketplace bustles
 with gossip and wine, entangled in a love so perilous it
 could undo the very houses that raised them.
"""

max_context_length = 512
