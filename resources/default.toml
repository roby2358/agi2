# Default AGI2 Configuration
# Usage: uv run python agi2_train.py resources/default.toml

sources = [
    "resources/training/corpus.txt",
    "resources/training/corpus01.txt",
    "resources/training/corpus20.txt"
]

model_name = "model"
model_path = "trained/model.pt"

# Training
epochs = 10
batch_size = 12
learning_rate = 3e-4
seq_len = 1024

# Model architecture
model_positions = 1024
model_embd = 768
model_layer = 12
model_head = 12
model_activation = "gelu"
model_dropout = 0.1

# Cosine similarity training
geometric_ratio = 0.5
anchor_ratio = 0.3
embedding_ratio = 0.2
curriculum_stage = 1
stage_patience = 5
position_decay = 0.5

# Performance
use_compile = false  # torch.compile() for fused kernels
use_amp = false      # Automatic mixed precision (CUDA only)

# Device and resume
device = "auto"  # "cpu", "cuda", or "auto"
resume = null    # Path to checkpoint, or null

# Generation
max_length = 100
temperature = 0.8
beam_size = 5
model_seed = """
The following is a conversation between a helpful AI assistant and a user. The AI is knowledgeable, creative, and always tries to provide useful and engaging responses.
"""

max_context_length = 1024
