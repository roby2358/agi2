# Small Model Configuration - Fast Training
# Usage: uv run python agi2_train.py resources/small_model.toml

sources = [
    "resources/training/corpus.txt",
    "resources/training/corpus20.txt"
]

tokenizer = "tiktoken"
model_name = "small_model"
model_path = "trained/small_model.pt"

# Training
epochs = 50
batch_size = 24
learning_rate = 5e-4
seq_len = 512

# Model architecture
model_positions = 512
model_embd = 384
model_layer = 6
model_head = 6
model_activation = "gelu"
model_dropout = 0.1

# Cosine similarity training
geometric_ratio = 0.7
anchor_ratio = 0.3
sigmoid_scale_start = 3.0
sigmoid_scale_end = 10.0

# Performance
use_compile = false
use_amp = false

# Device and resume
device = "auto"
resume = ""

# Generation
max_length = 300
temperature = 0.8
beam_size = 3
model_seed = """
This is a short, creative text generation model. It produces concise and imaginative responses.
"""

max_context_length = 512
