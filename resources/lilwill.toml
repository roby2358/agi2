# lil Will Model Configuration - Tiny Shakespeare
# Usage: uv run python agi2_train.py resources/lilwill.toml

sources = [
    "samples/shakespeare_complete.txt",
    "resources/training/corpus20.txt"
]

model_name = "lilwill"
model_path = "trained/lilwill.pt"

# Training
epochs = 100
batch_size = 16
learning_rate = 1e-4
seq_len = 512

# Model architecture
model_positions = 512
model_embd = 384
model_layer = 3
model_head = 3
model_activation = "gelu"
model_dropout = 0.1

# Cosine similarity training
geometric_ratio = 0.5
anchor_ratio = 0.3
embedding_ratio = 0.2
curriculum_stage = 1
stage_patience = 5
position_decay = 0.5

# Performance
use_compile = false
use_amp = false

# Device and resume
device = "auto"
resume = ""

# Generation
max_length = 300
temperature = 0.8
beam_size = 3
model_seed = """
Here lies the voice that taught us our own tongues. His words outlived
 his breath, shaping grief and joy alike, and in their echo we are
 never wholly without him.
"""

max_context_length = 512
