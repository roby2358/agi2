# lil Will Model Configuration - Tiny Shakespeare
# Usage: uv run python agi2_train.py resources/lilwill.toml

sources = [
    "samples/shakespeare_complete.txt",
    "resources/training/corpus20.txt"
]

tokenizer = "tiktoken"
model_name = "lilwill"
model_path = "trained/lilwill.pt"

# Training
epochs = 100
batch_size = 16
learning_rate = 1e-4
seq_len = 512

# Model architecture
model_positions = 512
model_embd = 384
model_layer = 6
model_head = 6
model_activation = "gelu"
model_dropout = 0.1

# Cosine similarity training
geometric_ratio = 0.7
anchor_ratio = 0.3
sigmoid_scale_start = 3.0
sigmoid_scale_end = 10.0

# Performance
use_compile = false
use_amp = false

# Device and resume
device = "auto"
resume = ""

# Generation
max_length = 300
temperature = 0.3
beam_size = 3
model_seed = """
Give ear to him whose words our speech did frame, In joy and grief alike, we speak his name.
"""

max_context_length = 512
