# Large Model Configuration - High Quality
# Usage: uv run python agi2_train.py resources/large_model.toml

sources = [
    "resources/training/corpus.txt",
    "resources/training/corpus20.txt"
]

model_name = "large_model"
model_path = "trained/large_model.pt"

# Training
epochs = 20
batch_size = 8
learning_rate = 2e-4
seq_len = 2048

# Model architecture
model_positions = 2048
model_embd = 1024
model_layer = 24
model_head = 16
model_activation = "gelu"
model_dropout = 0.1

# Cosine similarity training
geometric_ratio = 0.5
anchor_ratio = 0.3
embedding_ratio = 0.2
curriculum_stage = 1
stage_patience = 5
position_decay = 0.5

# Performance
use_compile = false
use_amp = false

# Device and resume
device = "auto"
resume = null

# Generation
max_length = 200
temperature = 0.7
beam_size = 8
model_seed = """
This is a high-quality language model trained on diverse text. It excels at producing coherent, well-structured, and contextually appropriate responses across a wide range of topics and writing styles.
"""

max_context_length = 2048
