# Moby Dick Training Configuration
# Usage: uv run python agi2_train.py resources/moby_dick.toml

sources = [
    "samples/moby_dick_pg2701.txt",
    "resources/training/corpus20.txt"
]

tokenizer = "tiktoken"
model_name = "moby_dick"
model_path = "trained/moby_dick.pt"

# Training
epochs = 100
batch_size = 12
learning_rate = 3e-4
seq_len = 1024

# Model architecture
model_positions = 1024
model_embd = 768
model_layer = 12
model_head = 12
model_activation = "gelu"
model_dropout = 0.1

# Cosine similarity training
geometric_ratio = 0.7
anchor_ratio = 0.3
sigmoid_scale_start = 3.0
sigmoid_scale_end = 10.0

# Performance
use_compile = false
use_amp = false

# Device and resume
device = "auto"

# Generation
max_length = 300
temperature = 0.8
beam_size = 5
model_seed = "Call me Ishmael. Some years ago—never mind how long precisely—having little or no money in my purse, and nothing particular to interest me on shore, I thought I would sail about a little and see the watery part of the world."

max_context_length = 1024
